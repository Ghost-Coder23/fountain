{% extends "base_dashboard.html" %}
{% block title %}Bad Request{% endblock %}
{% block content %}
<div class="container mt-5">
  <div class="card">
    <div class="card-body text-center">
      <h3 class="fw-bold">Bad Request</h3>
      <p class="text-muted">The server couldn't understand your request. Please check your input and try again.</p>
      <div class="mt-3">
        <a href="{% url 'analytics:dashboard' %}" class="btn btn-primary">Go to Dashboard</a>
        <a href="javascript:history.back()" class="btn btn-outline-secondary">Go Back</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
