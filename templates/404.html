{% extends "base_dashboard.html" %}
{% block title %}Page Not Found{% endblock %}
{% block content %}
<div class="container mt-5">
  <div class="card">
    <div class="card-body text-center">
      <h3 class="fw-bold">Page not found</h3>
      <p class="text-muted">We couldn't find the page you requested. Check the URL or return to the <a href="{% url 'analytics:dashboard' %}">dashboard</a>.</p>
      <div class="mt-3">
        <a href="{% url 'analytics:dashboard' %}" class="btn btn-primary">Go to Dashboard</a>
        <a href="javascript:history.back()" class="btn btn-outline-secondary">Go Back</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
